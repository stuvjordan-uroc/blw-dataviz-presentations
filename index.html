<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLW Data Visualization Presentations</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Source Sans Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 800px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    .subtitle {
      color: #666;
      margin-bottom: 40px;
      font-size: 1.1em;
    }

    .presentations {
      list-style: none;
    }

    .presentations li {
      margin-bottom: 15px;
    }

    .presentations a {
      display: block;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      transition: all 0.3s ease;
      border-left: 4px solid #667eea;
    }

    .presentations a:hover {
      background: #667eea;
      color: white;
      transform: translateX(5px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .pres-title {
      font-size: 1.3em;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .pres-date {
      font-size: 0.9em;
      opacity: 0.7;
    }

    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
      text-align: center;
      color: #999;
      font-size: 0.9em;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>📊 Data Visualization Presentations</h1>
    <p class="subtitle">A collection of RevealJS presentations</p>

    <ul class="presentations">
      <li>
        <a href="/slides/pres-20260225-harley/">
          <div class="pres-title">Harley Presentation</div>
          <div class="pres-date">February 25, 2026</div>
        </a>
      </li>
      <!-- Add new presentations here -->
    </ul>

    <footer>
      Built with RevealJS and Vite
    </footer>
  </div>
</body>

</html>
